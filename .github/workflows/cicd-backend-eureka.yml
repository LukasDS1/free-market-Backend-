name: CI/CD - Backend Eureka-Service

on:
  push:
    branches: [deploy]
    paths:
      - 'eureka-server/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Obtener version
        id: version
        run: echo "VERSION=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen
        run: |
          docker build -t dockermasterluka/eureka-server:${{ steps.version.outputs.VERSION }} ./eureka-server
          docker push dockermasterluka/eureka-server:${{ steps.version.outputs.VERSION }}