spring.application.name=locations-service

server.port= 8083

spring.datasource.url=jdbc:mysql://localhost:3306/freemarket_locations?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.register-with-eureka= true
eureka.client.fetch-registry= true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Circuit Breaker para auth-service
resilience4j.circuitbreaker.instances.authService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.authService.sliding-window-size=10
resilience4j.circuitbreaker.instances.authService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.authService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.authService.register-health-indicator=true
resilience4j.timelimiter.instances.authService.timeout-duration=3s
resilience4j.timelimiter.instances.authService.cancel-running-future=true

# Circuit Breaker para Google Maps / OpenStreetMap
resilience4j.circuitbreaker.instances.mapsService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.mapsService.sliding-window-size=10
resilience4j.circuitbreaker.instances.mapsService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mapsService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.mapsService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.mapsService.register-health-indicator=true
resilience4j.timelimiter.instances.mapsService.timeout-duration=5s
resilience4j.timelimiter.instances.mapsService.cancel-running-future=true


