spring.application.name=api-gateway
server.port=8086

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api-v1/auth/**

spring.cloud.gateway.routes[1].id=reserva-service
spring.cloud.gateway.routes[1].uri=lb://reserva-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api-v1/reserve/**

spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://reserva-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api-v1/productos/**

spring.cloud.gateway.routes[3].id=locations-service
spring.cloud.gateway.routes[3].uri=lb://locations-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api-v1/location/**

spring.cloud.gateway.routes[4].id=privileges-service
spring.cloud.gateway.routes[4].uri=lb://privileges-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api-v1/privileges/**

spring.cloud.gateway.routes[5].id=config-service
spring.cloud.gateway.routes[5].uri=lb://config-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api-v1/config/**

spring.cloud.gateway.routes[6].id=state-service
spring.cloud.gateway.routes[6].uri=lb://state-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api-v1/state/**

spring.cloud.gateway.routes[7].id=delivery-service
spring.cloud.gateway.routes[7].uri=lb://delivery-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api-v1/delivery/**

# ========== CIRCUIT BREAKER ==========
resilience4j.circuitbreaker.instances.privileges-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.privileges-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.privileges-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.privileges-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.privileges-service.registerHealthIndicator=true

# ========== TIMEOUT ==========
resilience4j.timelimiter.instances.privileges-service.timeout-duration=10s
resilience4j.timelimiter.instances.privileges-service.cancel-running-future=true