spring.application.name=api-gateway
server.port=8086

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api-v1/auth/**

spring.cloud.gateway.routes[1].id=reserva-service
spring.cloud.gateway.routes[1].uri=lb://reserva-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api-v1/reserve/**

# ← misma uri, distinto path
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://reserva-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api-v1/productos/**