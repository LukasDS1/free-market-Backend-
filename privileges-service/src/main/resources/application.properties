spring.application.name=privileges-service

server.port= 8082

spring.datasource.url=jdbc:mysql://localhost:3306/freemarket_privileges?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.register-with-eureka= true
eureka.client.fetch-registry= true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


resilience4j.circuitbreaker.instances.privilegesService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.privilegesService.sliding-window-size=10
resilience4j.circuitbreaker.instances.privilegesService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.privilegesService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.privilegesService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.privilegesService.register-health-indicator=true

# ============================================================
# TIMEOUT 
# ============================================================

resilience4j.timelimiter.instances.privilegesService.timeout-duration=3s
resilience4j.timelimiter.instances.privilegesService.cancel-running-future=true

# ============================================================
# ACTUATOR - Monitoreo del estado de los patrones
# ============================================================

# GET /actuator/health
# GET /actuator/circuitbreakers
management.endpoints.web.exposure.include=health,circuitbreakers

# Incluye el estado del circuit breaker dentro del /actuator/health
# Mostrará CLOSED, OPEN o HALF_OPEN por cada instancia
management.health.circuitbreakers.enabled=true

